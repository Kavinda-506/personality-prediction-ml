<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* Animated background orbs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: float 12s ease-in-out infinite;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #6c3ce0, #3b82f6);
            top: -10%;
            right: -10%;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ec4899, #f97316);
            bottom: -10%;
            left: -10%;
            animation-delay: -6s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header .icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6c3ce0, #3b82f6);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            box-shadow: 0 8px 32px rgba(108, 60, 224, 0.3);
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: -0.02em;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            font-weight: 400;
        }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(24px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
        }

        /* Form grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .form-grid .full-width {
            grid-column: 1 / -1;
        }

        /* Form groups */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input[type="number"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
            transition: all 0.25s ease;
            -moz-appearance: textfield;
        }

        .form-group input[type="number"]::-webkit-outer-spin-button,
        .form-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .form-group input[type="number"]:focus {
            border-color: rgba(108, 60, 224, 0.5);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 3px rgba(108, 60, 224, 0.15);
        }

        .form-group input[type="number"]::placeholder {
            color: #475569;
        }

        /* Toggle switch */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0;
        }

        .toggle {
            position: relative;
            width: 48px;
            height: 26px;
            flex-shrink: 0;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #64748b;
            top: 2px;
            left: 3px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle input:checked + .toggle-track {
            background: linear-gradient(135deg, #6c3ce0, #3b82f6);
            border-color: transparent;
        }

        .toggle input:checked + .toggle-track::after {
            transform: translateX(21px);
            background: #fff;
        }

        .toggle-label {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .toggle-label.active {
            color: #c4b5fd;
        }

        /* Predict button */
        .btn-predict {
            width: 100%;
            padding: 0.9rem;
            margin-top: 1.75rem;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #6c3ce0, #3b82f6);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-predict::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #7c4dff, #448aff);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-predict:hover::before {
            opacity: 1;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(108, 60, 224, 0.4);
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        .btn-predict span {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-predict.loading span {
            opacity: 0;
        }

        .btn-predict.loading::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Result panel */
        .result-panel {
            margin-top: 1.5rem;
            border-radius: 16px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .result-panel.show {
            max-height: 200px;
            opacity: 1;
        }

        .result-inner {
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }

        .result-inner.extrovert {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.12), rgba(236, 72, 153, 0.12));
            border-color: rgba(249, 115, 22, 0.2);
        }

        .result-inner.introvert {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(108, 60, 224, 0.12));
            border-color: rgba(59, 130, 246, 0.2);
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .result-value {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .result-inner.extrovert .result-value {
            background: linear-gradient(135deg, #f97316, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-inner.introvert .result-value {
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-emoji {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Error state */
        .result-inner.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .result-inner.error .result-value {
            font-size: 0.9rem;
            color: #fca5a5;
            font-weight: 500;
            background: none;
            -webkit-text-fill-color: unset;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 1.5rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🧠</div>
            <h1>Personality Predictor</h1>
            <p>Discover if you're an introvert or extrovert based on your behavior</p>
        </div>

        <div class="card">
            <form id="predictForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="timeAlone">Time Spent Alone</label>
                        <input type="number" id="timeAlone" placeholder="0 – 10" min="0" max="10" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label for="socialEvents">Social Events</label>
                        <input type="number" id="socialEvents" placeholder="0 – 10" min="0" max="10" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label for="goingOutside">Going Outside</label>
                        <input type="number" id="goingOutside" placeholder="0 – 10" min="0" max="10" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label for="friendsCircle">Friends Circle Size</label>
                        <input type="number" id="friendsCircle" placeholder="0 – 15" min="0" max="15" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label for="postFrequency">Post Frequency</label>
                        <input type="number" id="postFrequency" placeholder="0 – 10" min="0" max="10" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label>Stage Fear</label>
                        <div class="toggle-wrapper">
                            <label class="toggle">
                                <input type="checkbox" id="stageFear">
                                <span class="toggle-track"></span>
                            </label>
                            <span class="toggle-label" id="stageFearLabel">No</span>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>Drained After Socializing</label>
                        <div class="toggle-wrapper">
                            <label class="toggle">
                                <input type="checkbox" id="drained">
                                <span class="toggle-track"></span>
                            </label>
                            <span class="toggle-label" id="drainedLabel">No</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-predict" id="predictBtn">
                    <span>Predict Personality ✨</span>
                </button>
            </form>

            <div class="result-panel" id="resultPanel">
                <div class="result-inner" id="resultInner">
                    <div class="result-emoji" id="resultEmoji"></div>
                    <div class="result-label">Prediction</div>
                    <div class="result-value" id="resultValue"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle label updates
        const stageFearCheckbox = document.getElementById('stageFear');
        const drainedCheckbox = document.getElementById('drained');
        const stageFearLabel = document.getElementById('stageFearLabel');
        const drainedLabel = document.getElementById('drainedLabel');

        stageFearCheckbox.addEventListener('change', () => {
            stageFearLabel.textContent = stageFearCheckbox.checked ? 'Yes' : 'No';
            stageFearLabel.classList.toggle('active', stageFearCheckbox.checked);
        });

        drainedCheckbox.addEventListener('change', () => {
            drainedLabel.textContent = drainedCheckbox.checked ? 'Yes' : 'No';
            drainedLabel.classList.toggle('active', drainedCheckbox.checked);
        });

        // Form submission
        const form = document.getElementById('predictForm');
        const btn = document.getElementById('predictBtn');
        const resultPanel = document.getElementById('resultPanel');
        const resultInner = document.getElementById('resultInner');
        const resultEmoji = document.getElementById('resultEmoji');
        const resultValue = document.getElementById('resultValue');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Collect data
            const payload = {
                Time_spent_Alone: parseFloat(document.getElementById('timeAlone').value),
                Stage_fear: stageFearCheckbox.checked ? 1 : 0,
                Social_event_attendance: parseFloat(document.getElementById('socialEvents').value),
                Going_outside: parseFloat(document.getElementById('goingOutside').value),
                Drained_after_socializing: drainedCheckbox.checked ? 1 : 0,
                Frineds_circle_size: parseFloat(document.getElementById('friendsCircle').value),
                Post_frequency: parseFloat(document.getElementById('postFrequency').value)
            };

            // Loading state
            btn.classList.add('loading');
            btn.disabled = true;
            resultPanel.classList.remove('show');

            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(`Server error: ${res.status}`);

                const data = await res.json();
                const prediction = data.prediction;
                const isExtrovert = prediction === 'Extrovert';

                // Update result
                resultInner.className = `result-inner ${isExtrovert ? 'extrovert' : 'introvert'}`;
                resultEmoji.textContent = isExtrovert ? '🎉' : '📚';
                resultValue.textContent = prediction;

            } catch (err) {
                resultInner.className = 'result-inner error';
                resultEmoji.textContent = '⚠️';
                resultValue.textContent = err.message;
            }

            // Show result
            btn.classList.remove('loading');
            btn.disabled = false;
            resultPanel.classList.add('show');
        });
    </script>
</body>
</html>
